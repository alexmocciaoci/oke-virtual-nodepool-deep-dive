apiVersion: apps/v1
kind: Deployment
metadata:
  name: testoke
  namespace: poc-oke
spec:
  replicas: 2
  selector:
    matchLabels:
      app: testoke
  template:
    metadata:
      labels:
        app: testoke
    spec:
      serviceAccountName: sa-app
      terminationGracePeriodSeconds: 15
      containers:
      - name: testoke
        image: <region>.ocir.io/<namespace>/<repo>:1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]